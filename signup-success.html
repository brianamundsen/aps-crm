<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Complete — APS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060c18;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#0b1527;border:1px solid #1a2d50;border-radius:20px;padding:40px 32px;max-width:400px;width:100%;text-align:center}
  .check{font-size:64px;margin-bottom:16px}
  h1{font-size:26px;font-weight:800;color:#f1f5f9;margin-bottom:8px}
  p{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:24px}
  .detail{background:#080f1e;border:1px solid #1a2d50;border-radius:10px;padding:14px;margin-bottom:20px;font-size:13px;color:#94a3b8;text-align:left}
  .detail strong{color:#f1f5f9;display:block;margin-bottom:4px}
  .btn{display:inline-block;background:linear-gradient(135deg,#1d4ed8,#1e40af);border-radius:10px;padding:14px 28px;color:#fff;font-size:14px;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1>You're Registered!</h1>
  <p>Your payment was successful and your athlete profile has been created. Your coach will be in touch soon.</p>
  <div class="detail">
    <strong>What happens next:</strong>
    Your coach has been notified and your athlete profile is ready. Show up for your first session and your coach will have everything they need.
  </div>
  <a class="btn" href="javascript:window.close()">Done</a>
</div>
</body>
</html>
