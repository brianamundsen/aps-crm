function parisiPts(test,value,unit){
  if(value===""||value===null||value===undefined)return null;
  var v=parseFloat(value);if(isNaN(v))return null;
  var pts,max=166;
  if(test==="10 yd split")      pts=Math.round(166-(v-1.45)/0.01);
  else if(test==="20 yd split") pts=Math.round(166-(v-2.50)/0.01);
  else if(test==="40 yd dash")  pts=Math.round(166-(v-4.50)/0.01);
  else if(test==="Vertical Jump")pts=Math.round(4*v+6);
  else if(test==="Broad Jump")  pts=Math.round(v*5/3-74);
  else if(test==="5-10-5 Agility")pts=Math.round(166-(v-4.25)/0.01);
  else if(test==="Chin up Hold"){if(unit!=="reps")return null;pts=Math.round(v*5);max=100;}
  else return null;
  return Math.max(2,Math.min(pts,max));
}

/* ══════════════════ PIPELINE (CRM) ══════════════════ */
var STAGES=[["lead","Leads","#60a5fa"],["trial","Trials","#fbbf24"],["active","Active","#34d399"],["inactive","Inactive","#94a3b8"],["lost","Lost","#fb7185"]];
var ACTC={note:"#94a3b8",call:"#60a5fa",text:"#22d3ee",email:"#a78bfa",meeting:"#fbbf24",eval:"#34d399",stage_change:"#f87171"};
var PIPE={loaded:false,loading:false,contacts:[],locMap:{},taskCount:0,filter:null,detailId:null,detail:null,detailLoading:false};
var PADD=null;

async function apiPatch(table,filter,body){var r=await fetch(SB_URL+"/rest/v1/"+table+"?"+filter,{method:"PATCH",headers:HDRS,body:JSON.stringify(body)});var t=await r.text();if(!r.ok)throw new Error("HTTP "+r.status+" "+t);return t?JSON.parse(t):[];}

function pipeName(c){return(((c.first_name||"")+" "+(c.last_name||"")).trim())||"Unnamed contact";}
function stageLabel(k){for(var i=0;i<STAGES.length;i++)if(STAGES[i][0]===k)return STAGES[i][1];return k;}
function contactLoc(id){if(!ADMIN_MODE)return LOCATION.id;for(var i=0;i<PIPE.contacts.length;i++)if(PIPE.contacts[i].id===id)return PIPE.contacts[i].location_id;return null;}
function timeAgo(iso){var d=new Date(iso),s=(Date.now()-d.getTime())/1000;if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";if(s<604800)return Math.floor(s/86400)+"d ago";return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});}

async function loadPipeline(){
  try{
    var q=ADMIN_MODE?"aps_contacts?select=*&order=updated_at.desc":"aps_contacts?location_id=eq."+LOCATION.id+"&select=*&order=updated_at.desc";
    PIPE.contacts=await apiGet(q);
    await refreshTaskCount();
    if(ADMIN_MODE){var locs=await dbLoadAllLocations();PIPE.locMap={};locs.forEach(function(l){PIPE.locMap[l.id]=l.name||l.code;});}
    PIPE.loaded=true;PIPE.loading=false;render();
  }catch(e){PIPE.loading=false;toast("Could not load pipeline",false);}
}
async function refreshTaskCount(){var q=ADMIN_MODE?"aps_tasks?select=id&done=eq.false":"aps_tasks?select=id&done=eq.false&location_id=eq."+LOCATION.id;var t=await apiGet(q);PIPE.taskCount=t.length;}

async function pipeOpen(id){PIPE.detailId=id;PIPE.detail=null;PIPE.detailLoading=true;render();await loadPipeDetail(id);}
function pipeClose(){PIPE.detailId=null;PIPE.detail=null;render();}
async function loadPipeDetail(id){
  try{
    var acts=await apiGet("aps_activities?contact_id=eq."+id+"&select=*&order=created_at.desc&limit=50");
    var tasks=await apiGet("aps_tasks?contact_id=eq."+id+"&select=*&order=done.asc,due_date.asc.nullslast");
    var mem=await apiGet("aps_memberships?contact_id=eq."+id+"&status=eq.active&select=plan_name,status,price_cents,billing_interval&limit=1");
    PIPE.detail={acts:acts,tasks:tasks,mem:(mem&&mem[0])||null};PIPE.detailLoading=false;
    if(PIPE.detailId===id)render();
  }catch(e){PIPE.detailLoading=false;toast("Could not load contact",false);}
}
async function pipeMove(id,stage){
  var c=null,i;for(i=0;i<PIPE.contacts.length;i++)if(PIPE.contacts[i].id===id)c=PIPE.contacts[i];
  if(!c||c.stage===stage)return;var from=c.stage;
  try{
    await apiPatch("aps_contacts","id=eq."+id,{stage:stage});
    await apiPost("aps_activities",{location_id:contactLoc(id),contact_id:id,type:"stage_change",body:from+" → "+stage});
    c.stage=stage;toast("Moved to "+stageLabel(stage),true);await loadPipeDetail(id);
  }catch(e){toast("Could not update stage",false);}
}
async function pipeAddActivity(id,type,body){
  if(!body){toast("Add a quick note first",false);return;}
  try{await apiPost("aps_activities",{location_id:contactLoc(id),contact_id:id,type:type,body:body});toast("Logged",true);await loadPipeDetail(id);}
  catch(e){toast("Could not log activity",false);}
}
async function pipeAddTask(id,title,due){
  if(!title){toast("Name the follow-up first",false);return;}
  try{await apiPost("aps_tasks",{location_id:contactLoc(id),contact_id:id,title:title,due_date:due||null});toast("Follow-up added",true);await refreshTaskCount();await loadPipeDetail(id);}
  catch(e){toast("Could not add follow-up",false);}
}
async function pipeToggleTask(tid,done){try{await apiPatch("aps_tasks","id=eq."+tid,{done:done});await refreshTaskCount();if(PIPE.detailId!=null)await loadPipeDetail(PIPE.detailId);}catch(e){toast("Could not update task",false);}}

function pipeAddOpen(){PADD={first_name:"",last_name:"",email:"",phone:"",relationship:"",source:"",stage:"lead",notes:"",athlete_id:"",err:""};render();}
function pipeAddClose(){PADD=null;render();}
async function pipeSaveContact(){
  if(!PADD.first_name.trim()&&!PADD.last_name.trim()){PADD.err="Add a first or last name so this contact has something to go by.";render();return;}
  var rec={location_id:LOCATION.id,first_name:PADD.first_name.trim(),last_name:PADD.last_name.trim(),email:PADD.email.trim()||null,phone:PADD.phone.trim()||null,relationship:PADD.relationship||null,source:PADD.source||null,stage:PADD.stage,notes:PADD.notes.trim()||null,athlete_id:PADD.athlete_id?parseInt(PADD.athlete_id):null};
  try{await apiPost("aps_contacts",rec);PADD=null;toast("Contact added",true);PIPE.loaded=false;PIPE.loading=false;render();}
  catch(e){PADD.err="Could not save: "+e.message;render();}
}

  var items=filteredAthletes().filter(function(a){return S.aGen==="All"||a.gender===S.aGen;}).map(function(a){var ag=ageGrp(a.age);return{name:a.name.split(" ")[0],score:getNrm(a.gender,S.aTest,ag,a.results[S.aTest]),r:getRat(a.gender,S.aTest,ag,a.results[S.aTest])};}).filter(function(d){return d.score!==null;}).sort(function(a,b){return b.score-a.score;});
  if(!items.length)ap(rc,mk("p","color:#64748b;font-size:12px;padding:16px 0","No "+S.aTest+" results yet."));
  else rc.appendChild(barChart(items.map(function(d){return d.score;}),items.map(function(d){return d.name;}),items.map(function(d){return RC[d.r]||"#64748b";}),320,155));
  ap(rc,mk("p","font-size:10px;color:#64748b;margin-top:6px","Green=Excellent · Blue=Good · Amber=Avg · Red=Below Avg"));
  ac.appendChild(ctitle("Avg by Age Group — "+S.aTest));
  var gF=S.aGen==="All"?["Boys","Girls"]:[S.aGen];
  var ds=gF.map(function(g){return{label:g,color:GB[g],data:AGS.map(function(ag){var sc2=filteredAthletes().filter(function(a){return a.gender===g&&ageGrp(a.age)===ag;}).map(function(a){return getNrm(a.gender,S.aTest,ag,a.results[S.aTest]);}).filter(function(v){return v!==null;});return sc2.length?Math.round(sc2.reduce(function(a,b){return a+b;},0)/sc2.length):null;})};});
  ac.appendChild(groupedBar(ds,AGS,320,155));
  sc.appendChild(ctitle("Standards — "+S.aTest));
  var tbl=document.createElement("table");var thead=document.createElement("thead"),hr=document.createElement("tr");
  [["Gender","#64748b"],["Age","#64748b"],["Excellent","#22c55e"],["Good","#38bdf8"],["Average","#f59e0b"],["Below Avg","#f87171"],["Unit","#64748b"]].forEach(function(h){var th=document.createElement("th");th.style.color=h[1];th.textContent=h[0];hr.appendChild(th);});
  thead.appendChild(hr);tbl.appendChild(thead);
  var tbody=document.createElement("tbody");
  ["Boys","Girls"].forEach(function(g){AGS.forEach(function(ag){var s=getS(g,S.aTest,ag);if(!s)return;var row=document.createElement("tr");[[g,GB[g]],[ag,"#94a3b8"],[fmtVal(S.aTest,s.ex),"#22c55e"],[fmtVal(S.aTest,s.go),"#38bdf8"],[fmtVal(S.aTest,s.av),"#f59e0b"],[fmtVal(S.aTest,s.ba),"#f87171"],[S.aTest==="Broad Jump"?"ft/in":UNITS[S.aTest],"#64748b"]].forEach(function(cell,i){var td=document.createElement("td");td.style.color=cell[1];if(i>=2&&i<=5)td.style.fontFamily="'Courier New',monospace";td.textContent=cell[0];row.appendChild(td);});tbody.appendChild(row);});});
  tbl.appendChild(tbody);sc.appendChild(tbl);
}

/* ── ADD ATHLETE ── */
function buildAdd(){
  var wrap=div("flex:1;overflow-y:auto;padding:20px;padding-bottom:100px");
  var titleText="ADD ATHLETE",subText="Saved to "+LOCATION.name+" — visible to your coaches instantly.";
  if(FORM._mode==="edit"){titleText="EDIT EVALUATION — "+FORM.name;subText="Editing the "+(FORM.date||"selected")+" evaluation.";}
  else if(FORM._mode==="newEval"){titleText="NEW EVALUATION — "+FORM.name;subText="Adds a new dated evaluation to "+FORM.name+"'s history, keeping past results intact.";}
  ap(wrap,mk("div","font-size:26px;font-weight:800;color:#f1f5f9;margin-bottom:4px",titleText),mk("p","color:#64748b;font-size:13px;margin-bottom:20px",subText));
  var IS="width:100%;background:#080f1e;border:1px solid #1e3a6b;border-radius:8px;padding:8px 11px;color:#e2e8f0;outline:none;font-size:13px;font-family:inherit";
  var cols=div("display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:16px");
  var ic=div("card");ic.className="card";ic.appendChild(ctitle("Athlete Info"));
  var ig=div("display:grid;gap:11px");
  function mkI(field,extra){var i=document.createElement("input");i.style.cssText=IS;i.value=FORM[field]||"";for(var k in extra||{})i.setAttribute(k,extra[k]);i.addEventListener("input",function(){FORM[field]=this.value;});return i;}
  function mkTa(field){var ta=document.createElement("textarea");ta.style.cssText=IS+"resize:vertical";ta.rows=2;ta.value=FORM[field]||"";ta.addEventListener("input",function(){FORM[field]=this.value;});return ta;}
  ap(ig,ap(div(""),lbl("Name *"),mkI("name",{placeholder:"Full name"})));
  var ageI=mkI("age",{type:"number",min:"9",max:"19",placeholder:"15"});
  ageI.addEventListener("input",function(){FORM.age=this.value;onAgeGender();});
  var genSel=document.createElement("select");genSel.style.cssText=IS;["Boys","Girls"].forEach(function(g){var o=document.createElement("option");o.value=g;o.textContent=g;genSel.appendChild(o);});
  genSel.value=FORM.gender;genSel.addEventListener("change",function(){FORM.gender=this.value;onAgeGender();});
  var ar=div("display:grid;grid-template-columns:1fr 1fr;gap:10px");ap(ar,ap(div(""),lbl("Age *"),ageI),ap(div(""),lbl("Gender"),genSel));ig.appendChild(ar);
  var hw=div("display:grid;grid-template-columns:1fr 1fr;gap:10px");ap(hw,ap(div(""),lbl("Height"),mkI("height",{placeholder:"69 inches"})),ap(div(""),lbl("Weight (lbs)"),mkI("weight",{type:"number",placeholder:"145"})));ig.appendChild(hw);
  var dp=div("display:grid;grid-template-columns:1fr 1fr;gap:10px");ap(dp,ap(div(""),lbl("Eval Date *"),mkI("date",{type:"date"})),ap(div(""),lbl("Program"),mkI("program",{placeholder:"Elite Performance"})));ig.appendChild(dp);
  ap(ig,ap(div(""),lbl("Coach Notes"),mkTa("notes")),ap(div(""),lbl("Athlete Goals"),mkTa("goals")));ic.appendChild(ig);
  var badgeSpans={};
  var rc2=div("card");rc2.className="card";rc2.appendChild(ctitle("Test Results"));
  ap(rc2,mk("p","font-size:11px;color:#475569;margin-bottom:10px","Leave blank if not tested."));
  var rg=div("display:grid;gap:9px");
  function onAgeGender(){RATED.forEach(function(t){var bd=badgeSpans[t];if(!bd||!bd.parentNode)return;var r=FORM.age?getRat(FORM.gender,t,ageGrp(FORM.age),FORM.results[t]):null;var nb=badge(r);bd.parentNode.replaceChild(nb,bd);badgeSpans[t]=nb;});}
  RATED.forEach(function(t){
    var row=div("display:grid;grid-template-columns:2fr auto;gap:8px;align-items:flex-end");
    var initR=FORM.age?getRat(FORM.gender,t,ageGrp(FORM.age),FORM.results[t]):null;
    var bd=badge(initR);badgeSpans[t]=bd;
    var bdWrap=div("display:flex;align-items:center;padding-bottom:2px");bdWrap.appendChild(bd);
    if(t==="Broad Jump"){
      var cur=parseFloat(FORM.results[t]);var curFt="",curIn="";
      if(!isNaN(cur)&&FORM.results[t]!==""){curFt=String(Math.floor(cur/12));curIn=String(Math.round(cur-Math.floor(cur/12)*12));}
      var BJIS=IS+"min-width:0;padding:8px 4px;text-align:center;";
      var ftI=document.createElement("input");ftI.style.cssText=BJIS;ftI.type="number";ftI.step="1";ftI.min="0";ftI.value=curFt;ftI.placeholder="ft";
      var inI=document.createElement("input");inI.style.cssText=BJIS;inI.type="number";inI.step="1";inI.min="0";inI.max="11";inI.value=curIn;inI.placeholder="in";
      function syncBJ(){
        var fv=ftI.value.trim(),iv=inI.value.trim();
        if(fv===""&&iv===""){FORM.results[t]="";}
        else{
          var f=parseInt(fv)||0;var n=parseInt(iv)||0;
          if(n>11){n=11;inI.value="11";}
          if(n<0){n=0;inI.value="0";}
          FORM.results[t]=String(f*12+n);
        }
        var bd2=badgeSpans[t];
        if(bd2&&bd2.parentNode){var r=FORM.age?getRat(FORM.gender,t,ageGrp(FORM.age),FORM.results[t]):null;var nb=badge(r);bd2.parentNode.replaceChild(nb,bd2);badgeSpans[t]=nb;}
      }
      ftI.addEventListener("input",syncBJ);inI.addEventListener("input",syncBJ);
      var bjGrid=div("display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px");ap(bjGrid,ftI,inI);
      ap(row,ap(div(""),lbl("Broad Jump (ft / in)"),bjGrid),bdWrap);rg.appendChild(row);
      return;
    }
    var i=document.createElement("input");i.style.cssText=IS;i.type="number";i.step="0.001";i.value=FORM.results[t]||"";i.placeholder=UNITS[t];
    i.addEventListener("input",function(){FORM.results[t]=this.value;var bd=badgeSpans[t];if(bd&&bd.parentNode){var r=FORM.age?getRat(FORM.gender,t,ageGrp(FORM.age),this.value):null;var nb=badge(r);bd.parentNode.replaceChild(nb,bd);badgeSpans[t]=nb;}});
    ap(row,ap(div(""),lbl(t+" ("+UNITS[t]+")"),i),bdWrap);rg.appendChild(row);
  });
  var extra=div("border-top:1px solid #2a1818;padding-top:9px;margin-top:4px");ap(extra,mk("p","font-size:11px;color:#475569;margin-bottom:8px","Additional (no benchmark)"));
  // Chin ups — with reps/sec dropdown
  (function(){
    var cuRow=div("display:grid;grid-template-columns:1fr auto;gap:8px;align-items:flex-end;margin-bottom:8px");
    var cuInp=document.createElement("input");cuInp.style.cssText=IS+"min-width:0;padding:8px 4px;text-align:center;";cuInp.type="number";cuInp.step="1";cuInp.value=FORM.results["Chin up Hold"]||"";cuInp.placeholder="0";
    cuInp.addEventListener("input",function(){FORM.results["Chin up Hold"]=this.value;});
    var cuSel=document.createElement("select");cuSel.style.cssText=IS+"cursor:pointer;width:90px;";
    ["reps","sec"].forEach(function(u){var o=document.createElement("option");o.value=u;o.textContent=u;if((FORM.chinUpUnit||"reps")===u)o.selected=true;cuSel.appendChild(o);});
    cuSel.addEventListener("change",function(){FORM.chinUpUnit=this.value;});
    ap(cuRow,ap(div(""),lbl("Chin ups"),cuInp),ap(div(""),lbl("Unit"),cuSel));
    extra.appendChild(cuRow);
  }());
  
  rg.appendChild(extra);rc2.appendChild(rg);
  ap(cols,ic,rc2);wrap.appendChild(cols);
  var errDiv=mk("div","color:#f87171;font-size:13px;margin-bottom:12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:8px 14px;display:none","");
  wrap.appendChild(errDiv);
  var btns=div("display:flex;gap:10px");
  var saveLabel=FORM._mode==="edit"?"✓ Save Changes":FORM._mode==="newEval"?"✓ Save New Evaluation":"✓ Save Athlete";
  var saveBtn=mk("button","",saveLabel);saveBtn.className="btn-p";
  saveBtn.addEventListener("click",function(){
    var name=FORM.name.trim(),age=FORM.age.trim();
    if(!name||!age){errDiv.textContent="Name and Age are required.";errDiv.style.display="block";return;}
    if(!FORM.date){errDiv.textContent="Eval Date is required.";errDiv.style.display="block";return;}
    errDiv.style.display="none";
    var res={};ALL_T.forEach(function(t){res[t]=FORM.results[t]||"";});

    if(FORM._mode==="new"){
      // Duplicate check — same name + gender already on roster?
      var dup=null;
      for(var di=0;di<S.athletes.length;di++){
        var a=S.athletes[di];
        if(a.name.trim().toLowerCase()===name.toLowerCase()&&a.gender===FORM.gender){dup=a;break;}
      }
      if(dup){
        var goExisting=confirm("An athlete named \""+name+"\" ("+FORM.gender+") already exists on this roster.\n\nTap OK to add this as a NEW EVALUATION for the existing athlete (recommended — keeps their history together).\n\nTap Cancel to create a separate new athlete anyway.");
        if(goExisting){
          ensureEvaluations(dup);
          var evals2=dup.evaluations.slice();
          var entry={date:FORM.date,height:FORM.height,weight:FORM.weight,results:res,notes:FORM.notes,goals:FORM.goals};
          evals2.push(entry);
          var updated2={name:dup.name,age:age,gender:dup.gender,program:FORM.program||dup.program,
            date:entry.date,height:entry.height,weight:entry.weight,results:entry.results,notes:entry.notes,goals:entry.goals,
            evaluations:evals2};
          updateAthlete(dup._dbid,updated2);
          return;
        }
        // else fall through and create a separate athlete as requested
      }
      saveAthlete({name:name,age:age,gender:FORM.gender,height:FORM.height,weight:FORM.weight,date:FORM.date,program:FORM.program,notes:FORM.notes,goals:FORM.goals,results:res,chinUpUnit:FORM.chinUpUnit||'reps',
        evaluations:[{date:FORM.date,height:FORM.height,weight:FORM.weight,results:res,notes:FORM.notes,goals:FORM.goals,chinUpUnit:FORM.chinUpUnit||'reps'}]});
      return;
    }

    // edit or newEval — locate athlete being modified
    var target=null;for(var i=0;i<S.athletes.length;i++){if(S.athletes[i]._dbid===FORM._editId){target=S.athletes[i];break;}}
    if(!target){errDiv.textContent="Athlete not found.";errDiv.style.display="block";return;}
    ensureEvaluations(target);
    var evals=target.evaluations.slice();
    var newEntry={date:FORM.date,height:FORM.height,weight:FORM.weight,results:res,notes:FORM.notes,goals:FORM.goals,chinUpUnit:FORM.chinUpUnit||'reps'};

    if(FORM._mode==="newEval"){
      evals.push(newEntry);
    } else { // edit
      var idx=(FORM._editEvalIdx!==null&&FORM._editEvalIdx<evals.length)?FORM._editEvalIdx:evals.length-1;
      evals[idx]=newEntry;
    }
    var latest=evals[evals.length-1];
    var updated={name:name,age:age,gender:FORM.gender,program:FORM.program,
      date:latest.date,height:latest.height,weight:latest.weight,results:latest.results,notes:latest.notes,goals:latest.goals,chinUpUnit:latest.chinUpUnit||'reps',
      evaluations:evals};
    updateAthlete(FORM._editId,updated);
  });

  var clrBtn=mk("button","",FORM._mode==="new"?"Clear":"Cancel");clrBtn.className="btn-g";
  clrBtn.addEventListener("click",function(){
    if(FORM._mode!=="new"){clearForm();S.tab="roster";render();return;}
    clearForm();wrap.querySelectorAll("input,textarea").forEach(function(el){el.value="";});genSel.value="Boys";errDiv.style.display="none";RATED.forEach(function(t){var bd=badgeSpans[t];if(bd&&bd.parentNode){var nb=badge(null);bd.parentNode.replaceChild(nb,bd);badgeSpans[t]=nb;}});
  });
  ap(btns,saveBtn,clrBtn);wrap.appendChild(btns);return wrap;
}

function loadShareAthlete(){
  apiGet("aps_athletes?id=eq."+SHARE_ID+"&select=*").then(function(rows){
    if(!rows.length){S.loading=false;S.screen="share";S.athletes=[];render();return;}
    var r=rows[0];
    var d=JSON.parse(r.info);d._dbid=r.id;d._locationId=r.location_id;
    S.athletes=[normAthBJ(d)];
    S.loading=false;S.screen="share";render();
    apiGet("aps_locations?id=eq."+r.location_id+"&select=name").then(function(locs){
      if(locs.length){LOCATION.name=locs[0].name;render();}
    }).catch(function(){});
  }).catch(function(err){S.loading=false;S.screen="share";S.athletes=[];render();});
}

/* ── BOOT ── */
render();
if(SHARE_ID!==null){
  loadShareAthlete();
} else if(!LOCATION_CODE){
  S.screen="setup";render();
} else {
  loadLocation().then(function(found){
    if(!found){S.screen="setup";render();}
    else{loadAthletes();}
  }).catch(function(err){toast("Connection error: "+err.message,false);S.screen="setup";render();});
}
