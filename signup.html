<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Athlete Performance Score</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060c18;color:#f1f5f9;min-height:100vh}
  .header{background:linear-gradient(135deg,#060c1a,#0a1535);border-bottom:1px solid #1e3a6b;padding:16px 20px;display:flex;align-items:center;gap:12px}
  .icon{width:40px;height:40px;background:linear-gradient(135deg,#1d4ed8,#1e40af);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .header-text h1{font-size:18px;font-weight:800;color:#f1f5f9}
  .header-text p{font-size:11px;color:#3b82f6;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .container{max-width:480px;margin:0 auto;padding:24px 20px 80px}
  .location-name{font-size:24px;font-weight:800;color:#f1f5f9;margin-bottom:4px}
  .location-sub{font-size:13px;color:#64748b;margin-bottom:28px}
  .section{background:#0b1527;border:1px solid #1a2d50;border-radius:14px;padding:20px;margin-bottom:16px}
  .section-title{font-size:13px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
  .program-card{background:#080f1e;border:2px solid #1a2d50;border-radius:10px;padding:14px;cursor:pointer;margin-bottom:10px;transition:border-color .15s}
  .program-card:hover{border-color:#2563eb}
  .program-card.selected{border-color:#2563eb;background:rgba(37,99,235,.08)}
  .program-name{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
  .program-desc{font-size:12px;color:#64748b;margin-bottom:8px}
  .program-price{font-size:20px;font-weight:900;color:#3b82f6;font-family:'Courier New',monospace}
  label{display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  input,select{width:100%;background:#080f1e;border:1px solid #1a2d50;border-radius:8px;padding:11px 13px;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px}
  input:focus,select:focus{border-color:#2563eb}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#1e40af);border:none;border-radius:10px;padding:16px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .err{color:#f87171;font-size:13px;margin-top:8px;display:none}
  .loading{text-align:center;color:#64748b;padding:40px;font-size:14px}
  .stripe-note{font-size:11px;color:#475569;text-align:center;margin-top:12px}
  .no-programs{color:#64748b;font-size:14px;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="header">
  <div class="icon">⚡</div>
  <div class="header-text">
    <h1>Athlete Performance Score</h1>
    <p>Performance Program Registration</p>
  </div>
</div>

<div class="container">
  <div id="loading" class="loading">Loading...</div>
  <div id="content" style="display:none">
    <div class="location-name" id="loc-name"></div>
    <div class="location-sub">Select a program and complete your registration</div>

    <div class="section">
      <div class="section-title">Select Program</div>
      <div id="programs-list"></div>
    </div>

    <div class="section">
      <div class="section-title">Athlete Information</div>
      <label>Full Name *</label>
      <input type="text" id="name" placeholder="First and Last Name">
      <label>Date of Birth *</label>
      <div class="row3" style="display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:8px;margin-bottom:14px">
        <select id="dob-month"></select>
        <select id="dob-day"></select>
        <select id="dob-year"></select>
      </div>
      <label>Gender *</label>
      <select id="gender">
        <option value="Boys">Male</option>
        <option value="Girls">Female</option>
      </select>
      <label>Email</label>
      <input type="email" id="email" placeholder="parent@email.com">
      <label>Phone</label>
      <input type="tel" id="phone" placeholder="555-555-5555">
    </div>

    <button class="btn" id="signup-btn" onclick="startCheckout()">Sign Up & Pay Securely</button>
    <div class="err" id="err-msg"></div>
    <div class="stripe-note">🔒 Payments secured by Stripe. Your card info never touches our servers.</div>
  </div>
</div>

<script>
var LOCATION_CODE = (new URLSearchParams(window.location.search).get("location") || "").toUpperCase().trim();
var selectedProgramId = null;
var locationData = null;

var MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function daysInMonth(month, year) {
  return new Date(year, month, 0).getDate();
}

function populateDobDropdowns() {
  var monthSel = document.getElementById("dob-month");
  var daySel = document.getElementById("dob-day");
  var yearSel = document.getElementById("dob-year");

  monthSel.innerHTML = '<option value="">Month</option>' +
    MONTH_NAMES.map(function(m, i) { return '<option value="' + (i + 1) + '">' + m + '</option>'; }).join("");

  var currentYear = new Date().getFullYear();
  // Most youth athletes are roughly 3-19 years old; newest years first for fast scrolling to a typical birth year
  var startYear = currentYear - 3;
  var endYear = currentYear - 25;
  var yearOptions = '<option value="">Year</option>';
  for (var y = startYear; y >= endYear; y--) {
    yearOptions += '<option value="' + y + '">' + y + '</option>';
  }
  yearSel.innerHTML = yearOptions;

  function refreshDays() {
    var month = parseInt(monthSel.value) || 1;
    var year = parseInt(yearSel.value) || currentYear;
    var numDays = daysInMonth(month, year);
    var prevVal = daySel.value;
    var dayOptions = '<option value="">Day</option>';
    for (var d = 1; d <= numDays; d++) {
      dayOptions += '<option value="' + d + '">' + d + '</option>';
    }
    daySel.innerHTML = dayOptions;
    if (prevVal && parseInt(prevVal) <= numDays) { daySel.value = prevVal; }
  }

  monthSel.onchange = refreshDays;
  yearSel.onchange = refreshDays;
  refreshDays();
}

function getDobValue() {
  var m = document.getElementById("dob-month").value;
  var d = document.getElementById("dob-day").value;
  var y = document.getElementById("dob-year").value;
  if (!m || !d || !y) return "";
  var mm = String(m).padStart(2, "0");
  var dd = String(d).padStart(2, "0");
  return y + "-" + mm + "-" + dd;
}

async function loadPrograms() {
  try {
    var res = await fetch("/.netlify/functions/aps-get-programs?location=" + LOCATION_CODE);
    if (!res.ok) throw new Error("Location not found");
    var data = await res.json();
    locationData = data.location;
    document.getElementById("loc-name").textContent = data.location.name;
    var list = document.getElementById("programs-list");
    if (!data.products.length) {
      list.innerHTML = '<div class="no-programs">No programs available yet. Check back soon.</div>';
    } else {
      data.products.forEach(function(p) {
        var card = document.createElement("div");
        card.className = "program-card";
        card.dataset.id = p.id;
        card.innerHTML = '<div class="program-name">' + p.name + '</div>' +
          (p.description ? '<div class="program-desc">' + p.description + '</div>' : '') +
          '<div class="program-price">$' + (p.price_cents / 100).toFixed(2) + '</div>';
        card.onclick = function() {
          document.querySelectorAll(".program-card").forEach(function(c) { c.classList.remove("selected"); });
          card.classList.add("selected");
          selectedProgramId = p.id;
        };
        list.appendChild(card);
      });
    }
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
  } catch(e) {
    document.getElementById("loading").textContent = "Error: " + e.message;
  }
}

async function startCheckout() {
  var err = document.getElementById("err-msg");
  err.style.display = "none";
  if (!selectedProgramId) { err.textContent = "Please select a program."; err.style.display = "block"; return; }
  var name = document.getElementById("name").value.trim();
  var dob = getDobValue();
  if (!name || !dob) { err.textContent = "Name and date of birth are required."; err.style.display = "block"; return; }

  var btn = document.getElementById("signup-btn");
  btn.disabled = true; btn.textContent = "Redirecting to payment...";

  try {
    var res = await fetch("/.netlify/functions/aps-create-checkout", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        locationCode: LOCATION_CODE,
        programId: selectedProgramId,
        athleteData: {
          name: name,
          dob: dob,
          gender: document.getElementById("gender").value,
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim()
        }
      })
    });
    var data = await res.json();
    if (data.url) { window.location.href = data.url; }
    else { throw new Error(data.error || "Could not create checkout session"); }
  } catch(e) {
    err.textContent = "Error: " + e.message;
    err.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Sign Up & Pay Securely";
  }
}

populateDobDropdowns();
if (LOCATION_CODE) { loadPrograms(); }
else { document.getElementById("loading").textContent = "No location specified in URL."; }
</script>
</body>
</html>
